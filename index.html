<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yacine Office</title>

    <style>
        /* الخطوط والألوان */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            background: #e5e7eb;
            text-align: center;
            transition: background 0.5s;
        }

        header {
            background: linear-gradient(90deg, #0f172a, #1e293b);
            color: white;
            padding: 50px 20px;
            font-size: 40px;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #22c55e;
            transform: scale(1.1);
        }

        section {
            padding: 50px 20px;
            text-align: center;
        }

        .container {
            background: white;
            max-width: 950px;
            margin: auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .container:hover {
            transform: scale(1.01);
        }

        .services {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
        }

        .service {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            color: white;
            padding: 25px;
            border-radius: 12px;
            width: 220px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .service:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .social a {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .social a:hover {
            background: linear-gradient(135deg, #22c55e, #10b981);
            transform: scale(1.1);
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            background: linear-gradient(135deg, #22c55e, #10b981);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .bot {
            display: none;
            margin-top: 25px;
        }

        input {
            padding: 12px;
            margin: 10px;
            width: 230px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        img.service-image {
            margin-top: 20px;
            max-width: 100%;
            border-radius: 12px;
            display: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: 0.5s;
        }

        iframe {
            margin-top: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        footer {
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 25px;
            margin-top: 40px;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <header>
        YACINE OFFICE
    </header>

    <section>
        <div class="container">

            <h2>مرحبا بكم</h2>
            <p>مكتب ياسين للخدمات الرقمية</p>

            <h3>الخدمات</h3>
            <div class="services">
                <div class="service" onclick="showImage('word')">📄 بحوث Word لجميع الأطوار</div>
                <div class="service" onclick="showImage('ppt')">📊 عروض PowerPoint</div>
                <div class="service" onclick="showImage('excel')">📈 أعمال Excel</div>
            </div>

            <img id="word" class="service-image" src="https://via.placeholder.com/600x300?text=بحث+Word" alt="Word">
            <img id="ppt" class="service-image" src="https://via.placeholder.com/600x300?text=عرض+PowerPoint"
                alt="PowerPoint">
            <img id="excel" class="service-image" src="https://via.placeholder.com/600x300?text=Excel" alt="Excel">

            <h3>التواصل</h3>
            <p>📞 الهاتف: 0675315851</p>
            <p>📍 العنوان: الجزائر العاصمة</p>

            <div class="social">
                <a href="https://wa.me/213675315851" target="_blank">WhatsApp</a>
                <a href="https://www.instagram.com/y4cn__" target="_blank">Instagram @y4cn__</a>
                <a href="https://www.facebook.com/yaxine.yx.yx" target="_blank">Facebook yaxine yx yx</a>
            </div>

            <button onclick="openBot()">حجز خدمة</button>

            <div class="bot" id="bot">
                <h3>طلب حجز</h3>
                <input type="text" id="name" placeholder="الاسم"><br>
                <input type="text" id="lastname" placeholder="اللقب"><br>
                <input type="text" id="phone" placeholder="رقم الهاتف"><br>
                <button onclick="sendWhatsapp()">إرسال الطلب</button>
            </div>

            <h3>موقعنا</h3>
            <iframe width="100%" height="300"
                src="https://maps.google.com/maps?q=alger&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>

        </div>
    </section>

    <footer>
        © 2026 Yacine Office - Algeria
    </footer>

    <script>
        function openBot() {
            document.getElementById("bot").style.display = "block";
        }
        function sendWhatsapp() {
            var name = document.getElementById("name").value;
            var lastname = document.getElementById("lastname").value;
            var phone = document.getElementById("phone").value;
            var message = "مرحبا اريد حجز خدمة%0Aالاسم: " + name +
                "%0Aاللقب: " + lastname +
                "%0Aرقم الهاتف: " + phone;
            window.open("https://wa.me/213675315851?text=" + message);
        }
        function showImage(service) {
            var images = document.querySelectorAll('.service-image');
            images.forEach(img => img.style.display = 'none');
            document.getElementById(service).style.display = 'block';
        }
    </script>

</body>

</html>
