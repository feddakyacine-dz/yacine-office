<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amour Yassin & Amira</title>
<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        text-align: center;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        color: #fff;
        overflow-x: hidden;
        padding: 50px;
    }

    h1 {
        font-size: 3em;
        margin-top: 20px;
        animation: fadeIn 2s ease-in;
    }

    .heart {
        font-size: 2em;
        animation: heartbeat 1s infinite;
    }

    @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.3); }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px);}
        to { opacity: 1; transform: translateY(0);}
    }

    .snap-links a {
        display: inline-block;
        margin: 10px;
        padding: 15px 25px;
        background-color: #ff5e62;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-weight: bold;
        transition: 0.3s;
    }

    .snap-links a:hover {
        background-color: #ff758c;
    }

    .love-phrases {
        font-size: 1.5em;
        margin: 30px;
        animation: fadeIn 3s ease-in-out infinite alternate;
    }

    .heart-falling {
        position: fixed;
        top: -50px;
        font-size: 2em;
        animation: fall 5s linear infinite;
    }

    @keyframes fall {
        0% { transform: translateY(0) rotate(0deg); opacity:1; }
        100% { transform: translateY(110vh) rotate(360deg); opacity:0; }
    }
</style>
</head>
<body>

<h1>❤️ Yassin & Amira ❤️</h1>
<p class="heart">💞</p>

<div class="snap-links">
    <a href="https://snapchat.com/add/loveeelyyyu7" target="_blank">Snap Amira: @loveeelyyyu7</a>
    <a href="https://snapchat.com/add/yaaaaciney" target="_blank">Snap Yassin: @yaaaaciney</a>
</div>

<div class="love-phrases">
    "Chaque jour avec toi est un rêve éveillé 💖"<br>
    "Tu es mon sourire, mon bonheur et mon amour éternel 🌹"<br>
    "À deux, nous formons l’infini ❤️"
</div>

<!-- petits cœurs qui tombent -->
<div class="heart-falling" style="left:10%;">❤️</div>
<div class="heart-falling" style="left:30%; animation-delay:1s;">💖</div>
<div class="heart-falling" style="left:50%; animation-delay:2s;">💞</div>
<div class="heart-falling" style="left:70%; animation-delay:3s;">❤️</div>
<div class="heart-falling" style="left:90%; animation-delay:4s;">💖</div>

<!-- Musique de fond -->
<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    Votre navigateur ne supporte pas l'audio.
</audio>

</body>
</html>
